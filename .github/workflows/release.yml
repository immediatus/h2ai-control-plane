name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Container image ──────────────────────────────────────────────────────────
  docker:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps (llama.cpp FFI)
        run: sudo apt-get install -y cmake clang libclang-dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── Helm chart ───────────────────────────────────────────────────────────────
  helm:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update chart appVersion
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/h2ai-control-plane/Chart.yaml
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/h2ai-control-plane/Chart.yaml

      - name: Package chart
        run: |
          helm dependency update deploy/helm/h2ai-control-plane
          helm package deploy/helm/h2ai-control-plane --destination .helm-release/

      - name: Publish to GitHub Pages (chart repository)
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: deploy/helm
          skip_packaging: false
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── GitHub Release ────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, helm]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build deps
        run: sudo apt-get install -y cmake clang libclang-dev

      - name: Build release binaries
        run: cargo build --release --locked

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            target/release/h2ai-control-plane
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
