version: '3.8'

services:
  app:
    userns_mode: keep-id
    security_opt:
      - label=disable
    user: "developer"
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../:/workspaces/h2ai-control-plane:z
      - cargo-cache:/usr/local/cargo/registry:z
      - target-cache:/workspaces/h2ai-control-plane/target:z
      - ${HOME}/.claude:/home/developer/.claude
      - ${HOME}/.claude.json:/home/developer/.claude.json
      - ${HOME}/.gemini:/home/developer/.gemini
      - ${HOME}/.local/bin/claude:/home/developer/.local/bin/claude
      - ${HOME}/.local/share/dev-workspace/.local/bin/xclaude:/home/developer/.local/bin/xclaude
      - ${HOME}/.local/bin/claude:/usr/local/bin/claude
      - ${HOME}/.local/share/claude:/home/developer/.local/share/claude
      - ${HOME}/.local/bin/agy:/home/developer/.local/bin/agy
      - ${HOME}/.local/share/dev-workspace/.local/bin/xagy:/home/developer/.local/bin/xagy
      - ${HOME}/.local/bin/agy:/usr/local/bin/agy
      - /run/user/1000/bus:/run/user/1000/bus
    command: sleep infinity
    env_file:
      - .env
    environment:
      HOME: /home/developer
      USER: developer
      DBUS_SESSION_BUS_ADDRESS: unix:path=/run/user/1000/bus
    depends_on:
      nats:
        condition: service_healthy

  nats:
    image: nats:2-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ../nats/dev.conf:/etc/nats/nats.conf:ro,Z
      - ../nats/data:/data/jetstream:z
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  cargo-cache:
  target-cache:
