version: '3.8'

services:
  app:
    userns_mode: keep-id
    user: "${USER}"
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: ${USER}
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
    volumes:
      - ../:/${WORKSPACES_PATH}:z
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target
      - ${HOME}/.claude:/home/${USER}/.claude:z
      - ${HOME}/.claude.json:/home/${USER}/.claude.json:z
      - ${HOME}/.local/bin/claude:/home/${USER}/.local/bin/claude:z
      - ${HOME}/.local/bin/claude:/usr/local/bin/claude:z
    command: sleep infinity
    environment:
      HOME: /home/${USER}
      USER: ${USER}
      H2AI_NATS_URL: nats://nats:4222
      H2AI_LISTEN_ADDR: 0.0.0.0:8080
      H2AI_METRICS_ADDR: 0.0.0.0:9090
      H2AI_PROFILE: a
      RUST_LOG: h2ai=debug,info
      RUST_BACKTRACE: "1"
    depends_on:
      nats:
        condition: service_healthy

  nats:
    image: nats:2-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ../nats/dev.conf:/etc/nats/nats.conf:ro,Z
      - nats-data:/data/jetstream      
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  cargo-cache:
  target-cache:
  nats-data:
