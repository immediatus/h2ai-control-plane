id: CONSTRAINT-003
title: "RTB Timeout Strategy — Adaptive Per-DSP Timeouts"
severity: hard
domains:
  - rtb
  - latency
related_to:
  - CONSTRAINT-006  # JVM GC pauses compete with RTB deadline; ZGC chosen to stay under 2ms
remediation_hint: "Track per-DSP latency histograms locally in each Ad Server instance (no cross-instance coordination). Use P95 observed latency as the per-DSP cutoff budget; enforce a minimum warm-up sample count before activating adaptive mode. Always proceed with partial bids on timeout — never extend the global deadline."
criteria:
  pass: |
    All four behaviors are present:
    - Global deadline preserved: high-latency DSPs receive a tighter per-DSP cutoff, not a raised global timeout.
    - Cold-start safety: adaptive per-DSP timeout has a warm-up period (enough observed traffic) before activating — a brand-new DSP starts at the safe global default.
    - Local latency tracking: latency state lives inside each Ad Server instance; no cross-instance coordination needed for timeout decisions.
    - Graceful partial auction: when a DSP times out, the auction proceeds immediately with bids already received.
  partial: "Direction is correct but one of the four behaviors above is unclear or missing."
  fail: |
    The proposal raises the global RTB deadline to accommodate the slow DSP, or blocks the entire
    auction waiting for the slow DSP's response.
  checks:
    - Does the proposal track per-DSP latency histograms locally inside each Ad Server instance (no cross-instance coordination)?
    - Is the global RTB deadline (T_global) kept fixed at ≤100ms and never raised for slow DSPs?
    - Does the proposal require a cold-start warm-up period (≥100 samples) before activating adaptive per-DSP timeouts?
    - When a DSP times out, does the auction proceed immediately with bids already received (no blocking wait)?
