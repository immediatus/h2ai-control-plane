id: CONSTRAINT-004
title: "Budget Pacing — Idempotency Protection"
severity: hard
domains:
  - billing
  - consistency
related_to:
  - CONSTRAINT-005  # every budget deduction must publish to the immutable audit log
  - CONSTRAINT-007  # budget reads must use strong consistency (Redis counters, not cache)
remediation_hint: "Use a single Redis Lua script (EVAL) that atomically checks the idempotency key and debits the budget counter in one round-trip. Store idempotency keys with TTL matching your retry window. Never split the check and debit into separate commands."
criteria:
  pass: |
    The proposal (1) introduces an idempotency key or token tied to each request to detect
    duplicates, AND (2) performs the idempotency check and the budget deduction atomically — no
    window exists between checking the key and debiting the budget where a race condition could
    cause a double-debit (e.g. single Lua script, MULTI/EXEC transaction, or equivalent).
  partial: "The proposal mentions idempotency but the atomicity of check + deduction is unclear or the mechanism has an obvious race window."
  fail: |
    The proposal does not address idempotency at all, or uses a non-atomic check-then-act
    pattern (check key in one step, deduct in a separate step with no atomicity guarantee).
