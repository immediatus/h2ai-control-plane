apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: h2ai
data:
  nats.conf: |
    port: 4222
    http_port: 8222
    server_name: $SERVER_NAME

    jetstream {
      store_dir: "/data/jetstream"
      max_memory_store: 8GB
      max_file_store: 500GB
    }

    cluster {
      name: h2ai-cluster
      listen: 0.0.0.0:6222
      routes: [
        nats-route://nats-0.nats.h2ai.svc.cluster.local:6222
        nats-route://nats-1.nats.h2ai.svc.cluster.local:6222
        nats-route://nats-2.nats.h2ai.svc.cluster.local:6222
      ]
    }
