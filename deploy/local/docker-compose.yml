# Local Plan — Single workstation
# Static binary + single NATS node. No observability stack.
# Usage: docker compose up -d

version: '3.8'

services:
  h2ai:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: h2ai-control-plane:local
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./h2ai.toml:/etc/h2ai/h2ai.toml:ro
    environment:
      RUST_LOG: h2ai=debug,info
      RUST_BACKTRACE: "1"
    depends_on:
      nats:
        condition: service_healthy

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ../../nats/dev.conf:/etc/nats/nats.conf:ro
      - nats-data:/data/jetstream
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  nats-data:
