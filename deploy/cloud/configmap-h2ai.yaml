apiVersion: v1
kind: ConfigMap
metadata:
  name: h2ai-config
  namespace: h2ai
data:
  H2AI_NATS_URL: "nats://nats.h2ai.svc.cluster.local:4222"
  H2AI_ADR_CORPUS_PATH: "/adr"
  H2AI_LISTEN_ADDR: "0.0.0.0:8080"
  H2AI_METRICS_ADDR: "0.0.0.0:9090"
  H2AI_MAX_BLOCKING_THREADS: "8"
  H2AI_MAX_RETRIES: "3"
  H2AI_CALIBRATION_TASKS: "3"
  H2AI_J_EFF_THRESHOLD: "0.4"
  H2AI_PLAN: "cloud"
  H2AI_OTEL_ENDPOINT: "http://jaeger-collector.observability.svc.cluster.local:4317"
  RUST_LOG: "h2ai=info"
