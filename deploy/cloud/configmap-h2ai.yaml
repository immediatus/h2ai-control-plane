apiVersion: v1
kind: ConfigMap
metadata:
  name: h2ai-config
  namespace: h2ai
data:
  h2ai.toml: |
    # H2AI Control Plane — cloud deployment override
    # Merged on top of reference.toml at startup.

    nats_url = "nats://nats.h2ai.svc.cluster.local:4222"

    [safety]
    profile = "production"
