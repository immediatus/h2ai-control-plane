apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: h2ai-control-plane
  namespace: h2ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: h2ai-control-plane
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
