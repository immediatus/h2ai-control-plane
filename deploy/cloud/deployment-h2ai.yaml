apiVersion: apps/v1
kind: Deployment
metadata:
  name: h2ai-control-plane
  namespace: h2ai
  labels:
    app: h2ai-control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: h2ai-control-plane
  template:
    metadata:
      labels:
        app: h2ai-control-plane
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: h2ai-control-plane
          image: ghcr.io/h2ai/control-plane:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: RUST_LOG
              value: "h2ai=info"
          volumeMounts:
            - name: h2ai-config
              mountPath: /etc/h2ai
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 4Gi
      volumes:
        - name: h2ai-config
          configMap:
            name: h2ai-config
