events {}

http {
  upstream h2ai {
    server h2ai-0:8080;
    server h2ai-1:8080;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://h2ai;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      # SSE / WebSocket support
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      proxy_set_header Connection '';
      chunked_transfer_encoding on;
    }
  }
}
