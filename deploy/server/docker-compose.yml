# Server Plan — Team node
# 3-node NATS cluster + 2 h2ai replicas + Prometheus + Grafana + Jaeger
# Usage: docker compose up -d

version: '3.8'

x-h2ai-env: &h2ai-env
  H2AI_NATS_URL: nats://nats-0:4222,nats://nats-1:4222,nats://nats-2:4222
  H2AI_CONSTRAINT_CORPUS_PATH: /adr
  H2AI_LISTEN_ADDR: 0.0.0.0:8080
  H2AI_METRICS_ADDR: 0.0.0.0:9090
  H2AI_MAX_BLOCKING_THREADS: "8"
  H2AI_MAX_RETRIES: "3"
  H2AI_CALIBRATION_TASKS: "3"
  H2AI_J_EFF_THRESHOLD: "0.4"
  H2AI_PLAN: server
  H2AI_OTEL_ENDPOINT: http://jaeger:4317
  RUST_LOG: h2ai=info
  RUST_BACKTRACE: "1"

x-nats-common: &nats-common
  image: nats:2-alpine
  restart: unless-stopped
  volumes:
    - ../../nats/cluster.conf:/etc/nats/nats.conf:ro
  healthcheck:
    test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
    interval: 5s
    timeout: 3s
    retries: 10

services:
  # ── NATS cluster (3 nodes) ─────────────────────────────────────────────────
  nats-0:
    <<: *nats-common
    hostname: nats-0
    command: ["-c", "/etc/nats/nats.conf"]
    environment:
      SERVER_NAME: nats-0
    volumes:
      - ../../nats/cluster.conf:/etc/nats/nats.conf:ro
      - nats-0-data:/data/jetstream

  nats-1:
    <<: *nats-common
    hostname: nats-1
    command: ["-c", "/etc/nats/nats.conf"]
    environment:
      SERVER_NAME: nats-1
    volumes:
      - ../../nats/cluster.conf:/etc/nats/nats.conf:ro
      - nats-1-data:/data/jetstream

  nats-2:
    <<: *nats-common
    hostname: nats-2
    command: ["-c", "/etc/nats/nats.conf"]
    environment:
      SERVER_NAME: nats-2
    volumes:
      - ../../nats/cluster.conf:/etc/nats/nats.conf:ro
      - nats-2-data:/data/jetstream

  # ── H2AI control plane (2 replicas) ───────────────────────────────────────
  h2ai-0:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: h2ai-control-plane:local
    restart: unless-stopped
    environment:
      <<: *h2ai-env
    volumes:
      - ../../adr:/adr:ro
    depends_on:
      nats-0:
        condition: service_healthy
      nats-1:
        condition: service_healthy
      nats-2:
        condition: service_healthy

  h2ai-1:
    image: h2ai-control-plane:local
    restart: unless-stopped
    environment:
      <<: *h2ai-env
    volumes:
      - ../../adr:/adr:ro
    depends_on:
      h2ai-0:
        condition: service_started

  # ── Load balancer ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - h2ai-0
      - h2ai-1

  # ── Observability ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: h2ai
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  nats-0-data:
  nats-1-data:
  nats-2-data:
  prometheus-data:
  grafana-data:
