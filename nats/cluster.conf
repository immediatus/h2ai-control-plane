# NATS JetStream — Profile B/C (cluster mode)
# SERVER_NAME must be set per instance via environment variable
port: 4222
http_port: 8222
server_name: $SERVER_NAME

jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 8GB
  max_file_store: 500GB
}

cluster {
  name: h2ai-cluster
  listen: 0.0.0.0:6222
  routes: [
    nats-route://nats-0:6222
    nats-route://nats-1:6222
    nats-route://nats-2:6222
  ]
}
