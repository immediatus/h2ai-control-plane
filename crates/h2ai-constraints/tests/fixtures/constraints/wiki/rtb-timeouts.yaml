id: topic:rtb-timeouts
depth: topic
domains:
  - rtb
  - latency
synthesis: >
  C-003 (RTB Timeout Strategy — Adaptive Per-DSP Timeouts): The global RTB deadline
  T_global is fixed at 100ms — never increase it. High-latency DSPs get a tighter per-DSP
  cutoff, not a raised global deadline. Track per-DSP latency histograms locally in each
  Ad Server instance (no cross-instance coordination needed). Use P95 of observed latency
  as the per-DSP timeout signal — not P99, not mean, not a fraction of T_global. A new DSP
  must complete a warm-up period of ≥100 observed samples before activating adaptive mode;
  before warm-up, use T_global as the fallback timeout. On DSP timeout, always proceed with
  partial bids — never extend T_global or block auction completion. The per-DSP timeout
  must never exceed T_global. BidStream P99 latency (or end-to-end SLO of 150ms) must NOT
  be used as the per-DSP timeout value — these are different budget pools.
invariants:
  - "T_global ≤ 100ms (never raise it)"
  - "Per-DSP timeout = P95 of observed latency (not P99, not mean)"
  - "Adaptive mode requires ≥100 warm-up samples"
  - "New DSP starts with T_global as fallback timeout"
  - "On timeout, proceed with partial bids"
failure_modes_covered:
  - FM-003-1
tensions:
  - domain: latency
    reason: >
      P95 cutoff allows the slowest 5% of DSP responses to be skipped, trading
      revenue (missed bids) for latency compliance. Tune the percentile based on
      bid fill rate vs latency requirements.
entry_points:
  - CONSTRAINT-003
constraints:
  - CONSTRAINT-003
related:
  - CONSTRAINT-003
