id: CONSTRAINT-TAU-2
title: "Quota Change Atomicity — Runtime Quota Updates Must Be Instantly Consistent"
severity: hard
threshold: 0.6
domains:
  - saas
  - multi-tenancy
  - consistency
related_to:
  - CONSTRAINT-TAU-1
remediation_hint: "Quota changes must be atomic: either the new quota limit becomes visible to all rate-check paths simultaneously, or the old limit remains until the update is fully committed. Partial updates — where some API nodes observe the new quota and others the old — create inconsistent enforcement and revenue risk. Use Redis Lua EVAL or a CAS operation, never a read-then-write sequence."
criteria:
  pass: |
    All of the following are true:
    - Quota updates use an atomic operation (Redis Lua EVAL, compare-and-swap) — not a read-then-write sequence
    - All API nodes observe the new quota within one quota-cache TTL after the change commits (bounded eventual consistency)
    - Quota changes take effect without a service restart or rolling redeployment
    - Every quota change is recorded in an audit log with the old value, new value, tenant_id, and actor identity
  partial: "Quota changes are eventually consistent but the convergence window is unbounded, or the audit log omits the actor identity."
  fail: |
    Any of the following:
    - Quota change requires a service restart or rolling deployment to take effect
    - Two API nodes can simultaneously enforce different quota limits for the same tenant after a change
    - No audit record of quota change events (old value, new value, who changed it)
  checks:
    - Does the quota change mechanism use an atomic operation (Redis Lua EVAL or CAS) to prevent split-view enforcement across API nodes?
    - Does the system propagate quota changes to all API nodes within a bounded convergence window (≤ quota cache TTL)?
    - Is every quota change recorded in an immutable audit log with old value, new value, tenant_id, and the actor's identity?
