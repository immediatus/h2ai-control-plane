# H2AI Control Plane — Reference Configuration
#
# This file is the single source of truth for all default values.
# Copy only the fields you need to change into your override file (h2ai.toml).
# Field-level overrides are also accepted via environment variables:
#   H2AI_<FIELD_NAME>=value  (upper-case field name)
#   Example: H2AI_BFT_THRESHOLD=0.9

# ── Physics thresholds ────────────────────────────────────────────────────────

# Byzantine fault tolerance threshold for BFT consensus operations.
# Range [0, 1].
bft_threshold = 0.85

# Maximum allowed coordination threshold θ derived from calibration.
# Range [0, 1].
coordination_threshold_max = 0.3

# Minimum baseline competence p₀ required to pass the multiplication condition.
# Range [0, 1].
min_baseline_competence = 0.3

# Maximum error correlation ρ tolerated before the multiplication condition fails.
# Range [0, 1].
max_error_correlation = 0.9

# ── Agent role default τ values ───────────────────────────────────────────────
# τ (temperature) controls output diversity per role. Range [0, 1].
# Higher = more exploratory output.

tau_coordinator = 0.05
tau_executor    = 0.40
tau_evaluator   = 0.10
tau_synthesizer = 0.80

# ── Agent role default error-cost weights ────────────────────────────────────
# Weight of each role's errors in the semilattice merge. Range [0, 1].
# Higher cost = role errors are penalised more heavily.

cost_coordinator = 0.1
cost_executor    = 0.5
cost_evaluator   = 0.9
cost_synthesizer = 0.1

# ── Token budgets ─────────────────────────────────────────────────────────────
# Single model budget: all full-generation LLM calls use model_max_tokens = 32768.
# Intentional exceptions: leader_diagnosis_max_tokens (128, one Socratic question)
# and calibration_probe.max_tokens (512, short structure probe).
model_max_tokens = 32768

# Maximum tokens per explorer generation call.
explorer_max_tokens = 32768

# Maximum tokens per evaluator verification call.
evaluator_max_tokens = 32768

# Maximum tokens per calibration probe call.
calibration_max_tokens = 32768

# Maximum tokens for decomposition steps 1 and 2 (analysis + role design).
decomposition_step_max_tokens = 32768

# Maximum tokens for decomposition step 3 (JSON formatting).
decomposition_json_max_tokens = 32768

# Disable extended thinking chains on Qwen3-style models (llama.cpp chat_template_kwargs).
# Set false for local thinking models to keep multi-step pipelines fast.
# Cloud APIs (OpenAI, Anthropic) ignore unknown body fields — safe to keep false globally.
adapter_enable_thinking = false

# Maximum tokens kept after context compaction.
# Caps the system context sent to each explorer/evaluator call.
# Keeps input short so the model has room for its thinking chain + output.
max_context_tokens = 8192

# ── Calibration ───────────────────────────────────────────────────────────────

# Temperature used for all calibration adapter probes. Range [0, 1].
calibration_tau = 0.5

# Number of adapter instances spawned during calibration.
# Minimum 3 for the USL two-point fit to produce real measurements.
# Fewer than 3 falls back to alpha_contention and beta_base_default.
calibration_adapter_count = 3

# τ spread [min, max] for calibration instances.
# Instances are spaced linearly across this range when clone_with_tau is available.
calibration_tau_spread = [0.3, 0.7]

# CG (coordination gain) fallback used when fewer than 3 adapters run calibration.
calibration_cg_fallback = 0.7

# CG collapse threshold. When CG_embed drops below this value the planner forces
# N_max = 1 (no ensemble overhead when coordination quality has collapsed).
# Default 0.10: below 10% agreement pairwise reconciliation is undefined.
cg_collapse_threshold = 0.10

# Cosine similarity threshold for counting two adapter outputs as "in agreement"
# when computing CG via embedding cosine (future path; currently CG uses constraint-profile Hamming).
cg_agreement_threshold = 0.85

# Embedding model for CG cosine agreement measurement.
# Requires the fastembed-embed Cargo feature.
# Options:
#   "AllMiniLmL6V2"  — 22 MB, ~8 ms/sentence CPU (default, smallest footprint)
#   "BgeSmallEnV1_5" — 109 MB, ~5 ms/sentence CPU (better MTEB STS scores)
embedding_model_name = "AllMiniLmL6V2"

# Minimum N_eff increment to include an adapter in EigenCalibration::n_pruned.
# Increase to 0.1–0.2 for small calibration pools (N ≤ 4).
eigen_n_eff_delta = 0.05

# Minimum TAO loop observations before TaoMultiplierEstimator state is persisted.
# Raise to 50–100 for high-variance task distributions.
tao_estimator_warmup = 20

# max_tokens cap for the single retry request issued after a per-turn TAO loop timeout.
# Thinking models (Qwen3, DeepSeek R1) require ≥ 4096 — they exhaust the internal
# reasoning budget before producing output at the old default of 512.
tao_timeout_retry_max_tokens = 4096

# Initial N_max used to seed the Thompson Sampling bandit warm prior at first startup.
# Clamped to [1, bandit_n_max_arms] by the bandit. Default 4 — conservative mid-range prior.
bandit_n_max_initial = 4

# ── USL physics ───────────────────────────────────────────────────────────────

# α contention constant: fraction of work that must serialise regardless of
# parallelism. Deployment-specific calibration heuristic.
# 0.12 = typical LLM workloads. Also accepts alias: calibration_alpha_single_adapter.
alpha_contention = 0.12

# β₀ base coherency cost per agent pair.
# 0.039 = AI-agents tier (default).
# 0.0225 = human-team tier.
# 0.0003 = CPU-core tier.
# Also accepts alias: kappa_eff_factor.
beta_base_default = 0.039

# Quality factor gained per TAO loop turn. Heuristic prior; converges after
# 20 Tier 1 oracle tasks via TaoMultiplierEstimator.
tao_per_turn_factor = 0.6

# Per-turn LLM call timeout in seconds for TAO loop adapters. Increase for slow or
# queued local models (rule of thumb: n_adapters × single_call_time_s). Default 600.
tao_per_turn_timeout_secs = 600

# EMA smoothing factor for TaoMultiplierEstimator drift tracking.
# Smaller values weight historical data more; larger values react faster to drift.
# Half-life in samples ≈ ln(2) / alpha. Default 0.05 → ~14-sample half-life.
tao_estimator_ema_alpha = 0.05

# Context pressure sensitivity γ. Scales how much a full context window raises β.
# 0 = disabled (β unchanged). 0.5 = β doubles when context is completely full.
# Range [0, 1].
context_pressure_gamma = 0.5

# Directly measured per-adapter baseline accuracy proxy.
# 0.0 = use CG-mean proxy (0.5 + CG_mean / 2).
# Set via the benchmark compare tool (see docs/architecture/reference.md) output for empirically measured accuracy.
baseline_accuracy_proxy = 0.0

# ── Self-optimizer ────────────────────────────────────────────────────────────

# Initial verification pass threshold applied to each proposal's aggregate compliance score.
# Range [0, 1]. Set to 0.0 in test scenarios where the HITL gate (not verification quality)
# is the primary assertion.
verify_threshold = 0.45

# Step size for verify_threshold reduction suggestions. Range (0, 1).
optimizer_threshold_step = 0.1

# Floor for verify_threshold reductions. Threshold never goes below this value.
optimizer_threshold_floor = 0.3

# Fraction of proposals that must survive verification for the run to be
# considered "not wasteful". Below this threshold, SelfOptimizer suggestions
# are applied on the success path to reduce future waste.
optimizer_waste_threshold = 0.5

# ── MAPE-K retry ──────────────────────────────────────────────────────────────

# Maximum autonomic retry iterations before a task is declared failed.
max_autonomic_retries = 2

# ── Epistemic Leader ──────────────────────────────────────────────────────────

# Enable Raft-style cross-wave leader election with Socratic diagnosis.
leader_enabled = false

# Minimum q_confidence improvement per wave to avoid stagnation signal.
leader_stagnation_threshold = 0.02

# Consecutive stagnant waves before leadership rotates to runner-up.
leader_stagnation_waves = 1

# Max tokens for the leader's diagnosis re-prompt (Socratic question only).
leader_diagnosis_max_tokens = 128

# Max tokens for hallucination detection researcher call.
hallucination_check_max_tokens = 32768

# Max tokens for per-slot generation search grounding call.
generation_search_max_tokens = 32768

# Max tokens for planner decomposition LLM call.
planner_decompose_max_tokens = 32768

# Max tokens for planner semantic review LLM call.
planner_review_max_tokens = 32768

# Temperature for leader diagnosis re-prompt.
leader_diagnosis_tau = 0.3

# Number of EIG candidate questions generated per diagnosis round.
leader_eig_candidates = 3

# Credibility decay/recovery rate per wave [0.0, 1.0].
leader_credibility_decay_rate = 0.2

# Credibility threshold below which follower context is marked low-confidence.
leader_credibility_warn_threshold = 0.4

# Maximum concurrent task executions. Requests beyond this limit receive 503.
max_concurrent_tasks = 8

# Hard deadline in seconds for a single task end-to-end.
# Comment out or omit to disable the deadline.
# task_deadline_secs = 300

# ── Diversity ─────────────────────────────────────────────────────────────────

# Maximum τ-spread expansion factor when Talagrand detects over-confidence.
# 2.0 = τ spread can at most double from its manifest value.
tau_spread_max_factor = 2.0

# Learning rate η for the Talagrand KL τ-spread update rule (GAP-E2).
# Controls how aggressively τ adapts per wave. 0.1 = 10% of (U_score - Λ_score).
talagrand_eta = 0.1

# Minimum τ-spread factor; KL contraction cannot shrink τ below this floor.
talagrand_tau_min = 0.5

# ── Thompson Sampling bandit ──────────────────────────────────────────────────

# Tasks completed before activating the bandit (Phase 0 — pure exploration).
# During Phase 0, N = N_max_USL unconditionally.
bandit_phase0_k = 10

# Tasks completed before switching from ε-greedy to pure Thompson Sampling.
bandit_phase1_k = 30

# ε for Phase 1 ε-greedy: probability of selecting a random arm each task.
# Range [0, 1].
bandit_epsilon = 0.3

# Soft-reset decay factor when adapter version hash changes.
# 0.3 = blend 30% toward initial prior, preserving 70% of learned posterior.
bandit_soft_reset_decay = 0.3

# Maximum ensemble size the Condorcet search explores during calibration.
# Bounds EnsembleCalibration::from_cg_mean and from_measured_p.
# Lower on RAM-constrained nodes; raise for very large adapter pools.
calibration_max_ensemble_size = 9

# Maximum number of bandit arms (N values) explored by Thompson Sampling.
# Bandit considers N ∈ [1, bandit_n_max_arms]. Must be ≤ calibration_max_ensemble_size.
bandit_n_max_arms = 6

# σ for the Gaussian warm prior centered on N_max_USL.
# Lower = tighter prior (faster convergence). Default 2.0.
bandit_prior_sigma = 2.0

# Pseudo-observation strength for the bandit warm prior.
# Higher = slower learning on fresh deployments. Default 5.0.
bandit_prior_strength = 5.0

# ── Empirical baseline automation ─────────────────────────────────────────────

# When true, automatically switches to Empirical prediction basis after
# auto_baseline_eval_min_tasks Tier 1 oracle tasks complete.
auto_baseline_eval = false

# Minimum Tier 1 oracle task count before auto baseline evaluation triggers.
auto_baseline_eval_min_tasks = 50

# ── Multi-family enforcement ──────────────────────────────────────────────────

# ── Self-optimizer waste threshold ────────────────────────────────────────────
# (defined above under Self-optimizer section)

# ── NATS payload offloading ───────────────────────────────────────────────────

# Byte length above which system_context is offloaded to a content-addressed store
# and replaced with a hash reference in the NATS message (ContextPayload::Ref).
# Default 524288 (512 KB) — half of the NATS JetStream 1 MB default message size limit.
# Prevents publish failures when constraint corpora grow large.
payload_offload_threshold_bytes = 524288

# ── Event snapshots ───────────────────────────────────────────────────────────

# Events published per task before a state snapshot is written to NATS KV.
# Reduces crash-recovery replay time: recovery loads the latest snapshot and only
# replays events published after that snapshot's sequence number.
# Default 50. Set to 0 to disable snapshotting.
snapshot_interval_events = 50

# ── API server ────────────────────────────────────────────────────────────────

# Declares the current stable API version — used in logs, docs, and client defaults.
# Route prefixes are permanent API contracts compiled into the binary (/v1, /v2, …);
# ALL compiled versions are served simultaneously. Changing this field requires that
# the corresponding route handlers are already registered in the binary.
api_version = "v1"

# HTTP listen address for the API server. Default: "0.0.0.0:8080".
listen_addr = "0.0.0.0:8080"

# ── NATS ──────────────────────────────────────────────────────────────────────

# NATS server URL for the API server, edge agents, and integration tests.
# In Toolbox/podman containers NATS runs on the host — use host.docker.internal.
nats_url = "nats://host.docker.internal:4222"

# Enable NATS agent dispatch mode. When true, explorer slots are dispatched to
# TaoAgent processes via NATS rather than calling the in-process LLM adapter.
nats_dispatch_enabled = false

# TTL in seconds for NATS-dispatched agent task slots. Default: 30.
nats_agent_ttl_secs = 30

# Model name reported in AgentDescriptor for NATS-dispatched agent tasks.
nats_agent_model = "local"

# Timeout in seconds for a single NATS-dispatched agent task. Default: 120.
nats_agent_timeout_secs = 120

# ── Scheduler ─────────────────────────────────────────────────────────────────

# Scheduling policy for agent dispatch.
# "CostAwareSpillover" — route to lowest cost tier with headroom (default).
# "LeastLoaded"        — always route to globally least-loaded agent.
scheduler_policy = "CostAwareSpillover"

# Queue depth per cost tier at which CostAwareSpillover routes to the next tier.
# Only used when scheduler_policy = "CostAwareSpillover".
scheduler_spillover_threshold = 10

# ── Adapter profiles ──────────────────────────────────────────────────────────
# Named adapter configurations for TaskProfile routing.
# Add entries to configure model backends without scattering AdapterKind
# values through application startup code.
#
# Example entry:
# [[adapter_profiles]]
# name = "claude-sonnet"
# tier = "standard"
# [adapter_profiles.kind.Anthropic]
# api_key_env = "ANTHROPIC_API_KEY"
# model = "claude-sonnet-4-5"
adapter_profiles = []

# Example A2A adapter profile entry (external agent delegation via Agent2Agent protocol)
# [[adapter_profiles]]
# name = "specialist-planner"
# [adapter_profiles.kind.A2a]
# endpoint              = "https://my-specialist-agent.example.com"
# auth_scheme           = "bearer"          # "bearer", "api_key", or "none"
# auth_token_env        = "A2A_TOKEN"       # env var; leave empty for auth_scheme = "none"
# timeout_minutes       = 10
# poll_interval_ms      = 2000
# max_poll_interval_ms  = 30000
# agent_card_cache_ttl_s = 3600

# ── Synthesis ─────────────────────────────────────────────────────────────────

# Enable the two-stage critique-then-write synthesis phase.
# Set false to use the selection chain exclusively (pre-synthesis behaviour).
synthesis_enabled = true
synthesis_wave_enabled = true

# Minimum verified proposals needed before synthesis is attempted.
# Critique of a single proposal is degenerate (no contradictions possible).
synthesis_min_proposals = 2

# Temperature τ for critique and synthesis LLM calls.
# Lower than explorer τ encourages deterministic, structured JSON critique output.
synthesis_tau = 0.2

# Max tokens for the critique call (Stage 1).
synthesis_critique_max_tokens = 32768

# Max tokens for the synthesis call (Stage 2).
synthesis_max_tokens = 32768

# Overhead factor for the partial-pass truncation budget formula:
#   chars_per_partial = model_max_tokens * 4 / (max_k + partial_pass_overhead_factor)
# Represents system prompt + task description + repair scaffolding in units of
# partial-slot equivalents. At model_max_tokens=32768 and max_k=3: 32768*4/(3+5) = 16384 chars/partial.
partial_pass_overhead_factor = 5.0

# Enable sequential constraint grafting in the synthesis wave.
# When true the synthesis wave iteratively integrates one constraint cluster per LLM call.
# Each round includes intermediate verification; destructive grafts are rolled back.
# Default: false (opt-in; single-shot synthesis is the stable path).
sequential_grafting_enabled = false

# Maximum graft rounds before stopping.
# Each round = one focused LLM call + one verification pass.
sequential_grafting_max_rounds = 4

# ── Calibration Drift Detection ──────────────────────────────────────
# DDM sliding window size in tasks.
drift_ddm_window = 20
# DDM detection threshold in standard deviations (k × σ_reference).
drift_ddm_k = 2.5
# BOCPD hazard rate: P(changepoint at this observation). 0.01 ≈ 1 shift per 100 tasks.
drift_bocpd_hazard_rate = 0.01
# BOCPD posterior mass threshold on run-lengths {0,1,2,3,4} to fire CalibrationChangepoint.
drift_bocpd_changepoint_threshold = 0.90
# Trigger POST /calibrate automatically on CalibrationChangepoint (operator opt-in).
auto_recalibrate_on_drift = false
# Max seconds to operate with stale calibration before a tracing::warn is emitted.
drift_staleness_ttl_secs = 3600
# ORCA conformal margin subtracted from VerificationConfig::threshold when drift is active.
drift_conformal_margin = 0.05

# ── Shell Tool ────────────────────────────────────────────────────────────────

# Allowlist for Normal-mode waves. Empty array = unrestricted.
# WARNING: empty allowlist is NOT safe for production deployments.
shell_allowlist = []

# Allowlist for Hardened-mode waves (ConstrainedExploration / ModeCollapse).
# When shell_allowlist is non-empty, this MUST be a subset of shell_allowlist.
# The system emits tracing::warn! at boot for any command here that is absent from
# shell_allowlist — that would grant MORE capability in the hardened state.
# NOTE: with shell_allowlist = [] (unrestricted), BOTH modes are unrestricted —
# this list has no effect until shell_allowlist is populated for production.
shell_hardened_allowlist = ["ls", "cat", "git", "find", "echo", "pwd"]

# Maximum seconds a shell tool call may run before the process group is killed. Default: 5.
shell_timeout_secs = 5

# Maximum number of TAO loop tool-call iterations an edge agent may execute per task.
# After this limit the agent returns whatever output the LLM produced last. Default: 5.
agent_max_tool_iterations = 5

# Maximum bytes of a single tool observation appended to the agent context.
# Larger observations are truncated. Set to 0 to disable. Default: 8192.
agent_max_observation_chars = 8192

# ── ResumeSignal configuration ────────────────────────────────────────────────

# ms to wait at each WaveCompleted boundary for a WaveContinue signal. 0 = disabled.
signal_wave_window_ms = 0

# Minimum timeout_ms a caller may request via POST /signal.
signal_min_timeout_ms = 60_000

# Maximum timeout_ms a caller may request via POST /signal.
signal_max_timeout_ms = 86_400_000

# ── Enterprise executor capabilities ─────────────────────────────────────────
# Uncomment and configure any section to enable the corresponding tool.
# Absent sections = executor silently omitted from registry.
# Present sections with invalid config (missing env vars, bad paths) = node panics at startup.

# [web_search]
# api_key_env = "GOOGLE_SEARCH_API_KEY"   # env var name holding the API key
# cx_env      = "GOOGLE_SEARCH_CX"        # env var name holding the CSE ID
# max_results = 3

# [mcp_filesystem]
# command      = "npx"
# args         = ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]
# timeout_secs = 10

# [wasm_executor]
# interpreter_wasm_path = "assets/quickjs.wasm"
# fuel_budget           = 100_000

# ── Phase 1.5: Task Complexity Assessment ────────────────────────────────────
# Controls quadrant routing (Precision / Coverage / Complex / Degenerate).
[task_complexity]
# Phase 1.5 routing is live with analytical priors (experiment pending).
# shadow_mode = false means routing decisions are active; TCC thresholds are unfit priors.
# The controlled experiment (H2-P vs B3 vs H2-C on oracle-grounded task set) is
# required to replace these coefficients with fitted values. Until that experiment runs,
# routing decisions are made on analytical guesses — not empirical measurements.
# Set shadow_mode = true to collect routing events without affecting topology selection.
shadow_mode = false

# TCC below this → Precision quadrant (Self-MoA / within-family τ-spread).
tcc_precision_threshold = 2.0

# TCC above this → Coverage quadrant (cross-family committee).
tcc_coverage_threshold = 2.5

# TCC_structural formula coefficients — theoretical initial priors (spec §2.3).
# These will be replaced with fitted values after the experiment (spec §7.1).
# tcc = 1.0 + k_soft × soft_fraction + k_type × type_diversity
#           + k_cross × soft_fraction × type_diversity
k_soft  = 1.0
k_type  = 1.0
k_cross = 2.5

# Heavy-fraction amplification applied when static_coverage < min threshold.
# tcc_effective = tcc_structural × (1 + k_heavy × heavy_fraction)
k_heavy = 0.8

# Minimum static-coverage fraction to run N-probe sampling.
# Corpora below this are heavy-dominant; probe skipped; heavy amplification used.
min_static_coverage_for_probe = 0.3

# Number of mini-probe LLM calls for TCC_empirical estimation (Path C only).
n_probe = 3

# Pool N_eff threshold: below this, Coverage/Precision escalates to Complex/Degenerate.
n_eff_complex_threshold = 1.3

# ── Probe-path parameters (used when TCC_structural is in the ambiguous band) ─────────────────

# Max tokens per probe completion. Probe outputs are structure assessments, not full answers.
probe_max_tokens = 32768

# Temperature for probe completions. Mid-range τ produces varied but coherent outputs.
probe_tau = 0.5

# Minimum informative static constraints (≥1 pass AND ≥1 fail across probes) for TCC_empirical.
# Below this threshold eigendecomposition is degenerate; fall back to structural TCC.
tcc_min_informative_constraints = 2

# Mismatch penalty added when tcc_structural > tcc_empirical + 1.0.
# Conservative upward adjustment when corpus signals more complexity than probes observed.
tcc_mismatch_penalty = 0.5

# Probe N_eff thresholds (as fraction of n_probe) for quadrant routing.
# neff_probe_min_fraction × n_probe: below this → Complex or Degenerate.
# neff_probe_warning_fraction × n_probe: below this → Degenerate (vs Precision).
neff_probe_min_fraction     = 0.60
neff_probe_warning_fraction = 0.35

# ── Oracle sidecar ────────────────────────────────────────────────────────────
# Configuration for the Phase 6 async oracle evaluation service.
# The sidecar receives POST /oracle/run requests and runs test suites
# against the winning merged output.
# Absent or commented-out = Phase 6 oracle disabled (bootstrap intervals used).

# [oracle]
# # Path to the local binary invoked by the TestSuite oracle.
# # Ignored by schema, z3, reference_answer, human, and staged-code oracle types.
# runner_uri = "/opt/validators/run_tests.py"
# # Default timeout for oracle evaluations in milliseconds.
# default_timeout_ms = 10000
# # Language hint for TestSuite oracle output parsing ("python" enables pytest parsing).
# default_language = "python"

# ── Human-in-the-loop approval gate ──────────────────────────────────────────
# Controls when task outputs are held for human review before delivery.
# Disable entirely with enabled = false (useful for development environments).

[hitl]
enabled              = true
confidence_threshold = 0.50   # q_confidence below this triggers human review
timeout_ms           = 1800000 # 30 minutes — auto-rejected after this
timeout_decay        = 0.5    # halve per consecutive non-response
timeout_floor_ms     = 300000 # 5 min minimum

# ── Constraint Wiki ───────────────────────────────────────────────────────────
# mode = "disabled"  — no constraint resolution (default)
# mode = "fs"        — load from local YAML corpus at corpus_path

[constraint_wiki]
mode = "disabled"

# ── Correlated Hallucination ─────────────────────────────────────────
# CV threshold for clustering detection. 0.0 disables C1.
correlated_hallucination_cv_threshold = 0.30
# Minimum mean pairwise Jaccard distance required for C1 to fire.
# C1 fires only when cv < cv_threshold AND mean_jaccard < this floor.
# Prevents spurious retries when the ensemble is diverse but uniformly so.
correlated_hallucination_min_jaccard_floor = 0.50

# ── Domain Coverage ───────────────────────────────────────────────────
# Minimum slot-domain coverage fraction before DiversityGuardDegradedEvent fires.
domain_coverage_threshold = 0.40
# ── Grounding judge ──────────────────────────────────────────────────────────
# Controls the LLM grounding checker (GroundingChecker) that verifies proposals
# against factual knowledge. Disable in development to skip the grounding pass.
[grounding]
enabled        = true
max_tokens     = 8192
min_confidence = 0.7
tau            = 0.2

# ── Gap research chain ────────────────────────────────────────────────────────
# Controls distillation, compression, and synthesis for the GapResearchChain.
[gap_research]
grounding_distill              = true
grounding_compress_threshold   = 800
researcher_max_tokens          = 32768
distill_max_tokens             = 32768
gap_synthesis_max_tokens       = 32768

# ── Precision-mode slot budget ────────────────────────────────────────────────
# Maximum explorer slots for Precision-quadrant tasks (Self-MoA).
# Lower bound 2 is hardcoded (synthesis requires ≥2 proposals).
precision_mode_max_slots = 3

# ── Oracle calibration window ─────────────────────────────────────────────────
# Rolling window size for oracle calibration observations (FIFO cap).
oracle_window_size = 200

# ECE alert threshold — fires CalibrationDriftWarning when ECE exceeds this value
# over ≥30 observations. Based on CLT guidance for reliable ECE estimation.
oracle_ece_alert_threshold = 0.15

# Pass-rate floor — fires OracleSuspectEvent when pass_rate drops below this
# over ≥30 observations.
oracle_pass_rate_floor = 0.30

# NATS KV bucket name for human oracle pending requests.
oracle_human_bucket = "H2AI_ORACLE_HUMAN"

# LLM judge passes for Hard constraints. ≥2 averages scores, reducing single-pass false-positives.
verifier_consensus_passes = 1

# ── Debug NDJSON logging ──────────────────────────────────────────────────────
# When set, every completed task appends one JSON line to this file.
# Each line captures: task_id, description, grounding config,
# all verification proposals (full text + score), grounding events, merged output.
# The file is opened in append mode; directory must exist.
# Unset (commented out) disables logging. Sensitive — do not set in production.
# debug_log_path = "/tmp/h2ai-debug.ndjson"

# ── Safety profile ────────────────────────────────────────────────────────────────
# Controls all safety-relevant gates as a single authoritative tier.
# For profiles other than "custom", apply_safety_profile() at startup overwrites
# all fields below from the canonical profile definition — operator overrides to
# individual fields are ignored for non-custom profiles.
#
# Profiles:
#   development — all gates off; matches pre-behavior (startup logs WARN)
#   production  — krum=1, diversity=0.15, family=require_diverse, shadow=true
#   strict      — production + bivariate_cg=true, krum=2, diversity=0.20
#   custom      — operator owns all values below; no overwrite
[safety]
profile = "development"

# Fields below apply when profile = "custom".
# For all other profiles they are overwritten by apply_safety_profile().
krum_fault_tolerance = 0
krum_threshold = 0.30
diversity_threshold = 0.00
family_constraint = "single_family_ok"
require_bivariate_cg = false

# When true: if the diversity gate collapses but proposals passed verification,
# select the highest-scoring verified proposal instead of returning ZeroSurvival.
# The pipeline appends a diversity-conflict notice to the merged output.
# NOT overwritten by apply_safety_profile — explicit operator opt-in for known
# single-model deployments where diversity collapse is expected (not a BFT signal).
# Default: false (hard block on diversity collapse in production).
diversity_fallback_to_best = false

[safety.shadow_auditor]
enabled = false
promotion_threshold = 0.05
promotion_window = 30
auto_demotion = true
strict = false

# ── Oracle Gate ───────────────────────────────────────────────────────────────
# Phase 3 → Phase 4 oracle verification gate. Calls oracle service to verify
# proposed solution before proceeding to merge.
[oracle_gate]
enabled        = false
subject        = "h2ai.oracle.gate"
timeout_secs   = 30
on_timeout     = "pass"
min_confidence = 0.7
clarification_templates = []

# ── Thinking Loop ──────────────────────────────────────────────────────────────
# Pre-execution thinking: research → archetype selection → parallel brainstorm →
# synthesis → quality gate (coverage + convergence + LLM arbiter + hard cap).
# Disabled by default; enable per scenario with thinking_loop.enabled = true.
[thinking_loop]
enabled                   = false
max_iterations            = 5
max_archetypes            = 4
coverage_threshold        = 0.75
convergence_threshold     = 0.90
tau_max                   = 0.85
tau_min                   = 0.20
expansion_quality_floor   = 0.30
oracle_timeout_secs       = 20
oracle_confidence_bonus   = 0.1
archetype_select_max_tokens = 32768
brainstorm_max_tokens       = 32768
quality_gate_max_tokens     = 64

[thinking_loop.model_tiers]
fast     = ""
standard = ""
capable  = ""

# ── OPRO: Optimization by Prompt Retrieval ────────────────────────────────────
# Controls prompt variant selection, promotion criteria, and trigger thresholds.
[opro]
enabled                    = false
trigger_j_eff_threshold    = 0.6
min_tasks_before_trigger   = 10
suppress_n_tasks           = 5
graduation_tasks           = 20
promotion_margin           = 0.05
ema_window                 = 10
max_tokens                 = 32768

# ── Persistent Reasoning Memory ─────────────────────────────────────────────
# Disabled by default; enable once NATS is confirmed available.
[reasoning_memory]
enabled                     = false
induction_batch_size        = 10
induction_max_interval_secs = 86400
induction_max_tasks_per_run = 50
tag_gate_threshold          = 0.2
max_archetype_boost         = 0.15
max_archetype_penalty       = 0.20

# ── Conflict-Rate β ────────────────────────────────────────────────
[conflict_beta]
enabled                  = true
max_samples              = 100
halflife_secs            = 604800   # 7 days — same halflife as CG samples
min_samples_for_override = 5        # production tasks needed before rolling overrides floor

# ── Judge Panel ─────────────────────────────────────────────────────
[judge_panel]
# Supermajority fraction required for a confident CrossFamily verdict.
quorum_fraction = 0.67
# Compliance score multiplier applied to uncertain-constraint contributions.
uncertainty_weight = 0.7
# Per-persona temperatures for PersonaOnly panels: [Literal, Contextual, Skeptical].
# Capped at 0.4 — higher temperatures add noise rather than useful interpretive diversity.
persona_temperatures = [0.0, 0.2, 0.4]
# Min uncertain-vote count on one constraint per wave to emit ConstraintAmbiguityEvent.
ambiguity_threshold = 2

# ── Calibration Bootstrap ───────────────────────────────────────────────────
# Configuration for synthetic prior weight in calibration initialization.
[calibration_bootstrap]
prior_weight = 5

# ── Epistemic probe — β₀ from N_eff^adj ──────────────────────────────────────
[calibration_probe]
agents             = 3
max_tokens         = 512
system_modifier    = "compress_reasoning"
probe_task_source  = "same"
neff_cg_exponent   = 2.0

# ── AIMD slow start ───────────────────────────────────────────────────────────
[calibration_slow_start]
seed_alpha        = 0.15
decay_rate        = 0.95
reset_multiplier  = 3.0
reset_threshold   = 0.4

# ── State: NATS bucket names and delta checkpoint encoding ────────────────────
[state]
snapshots_bucket           = "H2AI_SNAPSHOTS"
task_checkpoints_bucket    = "H2AI_TASK_CHECKPOINTS"
checkpoint_payloads_bucket = "H2AI_CHECKPOINT_PAYLOADS"
oracle_calibration_bucket  = "H2AI_ORACLE_CALIBRATION"
estimator_bucket           = "H2AI_ESTIMATOR"
calibration_bucket         = "H2AI_CALIBRATION"
sessions_bucket            = "H2AI_SESSIONS"
audit_shadow_bucket        = "H2AI_AUDIT_SHADOW"
prompt_variants_bucket     = "H2AI_PROMPT_VARIANTS"
approvals_bucket                    = "H2AI_APPROVALS"
reasoning_checkpoint_bucket_prefix  = "H2AI_CHECKPOINT"
task_meta_state_bucket_prefix       = "H2AI_META"
tenant_memory_bucket_prefix         = "H2AI_MEMORY"
conflict_beta_bucket_prefix         = "H2AI_CONFLICT"
calibration_records_bucket          = "H2AI_CALIBRATION_RECORDS"
auditor_health_bucket               = "H2AI_AUDITOR_HEALTH"
probe_lease_bucket                  = "H2AI_PROBE_LEASE"
tasks_stream               = "H2AI_TASKS"
telemetry_stream           = "H2AI_TELEMETRY"
results_stream             = "H2AI_RESULTS"
signals_stream             = "H2AI_SIGNALS"

[state.delta]
enabled           = true
base_interval     = 10
cache_ttl_secs    = 60
cache_max_entries = 200

# ── Knowledge-Gap Detection and Domain Synthesis ─────────────────────
# When enabled, fires a researcher adapter on checks with pass rate ≤ cold_check_threshold.
# Synthesised domain knowledge is accepted only when LlmJudge scores ≥ synthesis_min_confidence.
# At most max_gap_records_per_wave researcher calls are issued per MAPE-K wave.
[gap_i1]
enabled                   = false
cold_check_threshold      = 0.0
synthesis_min_confidence  = 0.7
max_gap_records_per_wave  = 3
researcher_timeout_secs   = 90

# ── Constraint Coherence & Automated Spec Repair ──────────────────────
# Pre-flight coherence probe detects incoherent/unstable checks via repeated LlmJudge calls.
# Runtime instability circuit breaker monitors rejection-reason consistency across waves.
# When instability fires, SpecRepairAdvisor generates candidate rewrites.
[gap_k1]
enabled                     = false
auto_repair_enabled         = false
coherence_threshold         = 0.80
instability_threshold       = 0.10
repair_acceptance_threshold = 0.90
probe_runs                  = 5
repair_candidates           = 3
probe_cache_ttl_secs        = 86400
repair_max_tokens           = 32768

# ── CSPR-v2: Conflict-Aware Constraint-Scoped Prior Repair ───────────────────
[cspr]
# Enable patch-based repair on ZeroSurvival/ConstrainedExploration.
# When true, RetryWithHints anchors on the best prior proposal and emits
# targeted per-constraint repair instructions. Default: false.
enabled = false

# ── Complexity-Ceiling vs Quality-Ceiling Retry Routing ───────────────
# Pre-dispatch probe rates task complexity 1–5. High-complexity tasks route to
# H1 grafting (score >= decompose_threshold) or HITL (score >= hitl_threshold)
# on first failure instead of burning the full retry budget.
[complexity_routing]
enabled                          = false   # master switch; off by default
complexity_probe_adapter         = "researcher"  # adapter used for cheap probe call
complexity_probe_timeout_secs    = 30      # seconds before probe times out
decompose_threshold              = 4       # score >= 4 → graft on first failure
hitl_threshold                   = 5       # score >= 5 → HITL immediately
min_retries_before_graft         = 2       # graft fires only after this many normal retry waves (0 = immediate)
verifier_decomposition_enabled   = false   # enable BEYOND_BUDGET sub-claim verdicts

[complexity_routing.intra_retry]
enabled                          = false   # enable intra-retry ceiling detector
entropy_threshold                = 0.6     # Shannon H below this → peaked failure (ceiling signal)
retry_slope_threshold            = 0.05    # relative score improvement below this → no convergence
n_eff_cg_product_threshold       = 0.3    # N_eff×CG_mean below this → correlated failure
min_retry_count_for_detection    = 2       # don't fire before this many retries

# ── AgentDropout N-reduction ──────────────────────────────────────────
# Wang et al. ACL 2025 (arXiv 2503.18891): drop correlated adapters on retry 2+
# when participation ratio (N_eff) is low. Off by default.
[complexity_routing.agent_dropout]
enabled                    = false   # master switch; off by default
n_eff_dropout_threshold    = 0.5     # reduce n_agents when N_eff falls below this

# ── GAP-L1: Tiered Early Exit ────────────────────────────────────────────────
# When enabled, the engine starts each task with `min_n` explorers and escalates
# linearly to `max_n` across retry waves. A wave exits immediately when
# k_for_wave(n) = max(1, ceil(n × quorum_fraction)) proposals score ≥
# acceptance_score and (optionally) all binary_checks pass.
[tiered_exit]
enabled                   = false
min_n                     = 1
max_n                     = 5
quorum_fraction           = 0.5
acceptance_score          = 0.85
require_all_binary_checks = true

# ── GAP-H3: Cost Guard ─────────────────────────────────────────────────────────
[cost_guard]
enabled                        = false
budget_tokens_per_task         = 100000
budget_warning_fraction        = 0.80
budget_abort_fraction          = 1.00
budget_prompt_injection_enabled = false
budget_injection_warn_fraction  = 0.50
budget_injection_max_complexity = 3

# ── GAP-H3: Convergence Gate ───────────────────────────────────────────────────
[convergence_gate]
enabled                     = false
theta_converge              = 0.87
supermajority_fraction_n3   = 0.67
supermajority_fraction_n4plus = 0.80
score_floor                 = 0.80
min_wave                    = 1
budget_floor_fraction       = 0.30

# ── Generation Phase ──────────────────────────────────────────────────────────
# Wall-clock budget for one full explorer wave (join_all over all slots).
# Must exceed n_slots × per-adapter latency:
#   cloud APIs  → 300 s  (default, adequate for sub-1 min calls)
#   local LLMs  → 3600 s (3 slots × ~20 min each via llama.cpp)
[generation_phase]
timeout_secs = 300

# ── Verifier Freeze Detector ─────────────────────────────────────────────────
# Detects when all verifiers are stuck returning identical low-variance scores
# (frozen verifier syndrome). On freeze, the engine bypasses the hard gate and
# falls through to merge with the best available proposal.
[verifier_freeze]
enabled                              = true
min_waves_to_detect                  = 3      # need this many waves of evidence
score_variance_threshold             = 0.05   # variance below this → frozen
reason_jaccard_threshold             = 0.7    # reason similarity above this → frozen
reason_window_size                   = 10     # rolling window of verifier reasons
other_constraint_success_threshold   = 0.5    # bypass only if other constraints succeed
bypass_hard_gate_on_freeze           = true   # skip hard gate when frozen
emit_event_only                      = false  # true = log only, no bypass

# ── OOM Guard ────────────────────────────────────────────────────────────────
# Aborts a task if RSS memory exceeds rss_abort_mb between waves.
# Prevents runaway memory growth on large context accumulation.
[oom_guard]
enabled               = true
rss_abort_mb          = 4096   # abort threshold in MiB
check_interval_waves  = 1      # check every N waves

# ── Gap Quality Gate ─────────────────────────────────────────────────────────
# Controls whether a GAP-I1 researcher injection is retained for future waves.
# Injections that fail to improve the average score are discarded.
[gap_quality]
min_improvement_to_retain  = 0.1   # minimum Δscore to keep an injection
min_post_injection_waves   = 2     # observe for this many waves before deciding

# ── Audit Gate ────────────────────────────────────────────────────────────────
# Controls auditor Phase 4 behaviour on LLM response failures.
# Proposals reaching this gate have already passed the verifier — a parse failure
# is an LLM response issue, not a constraint judgment.
[audit_gate]
fail_open_on_parse_error = true   # true = pass through; false = reject (legacy behaviour)

# When true, the merger appends a "## Constraint Satisfaction Analysis" section to the
# resolved output whenever proposals were pruned.  Lists each pruned proposal's violated
# constraints and the LLM-generated reason, and explains the consensus basis.
# Default: false.
contradiction_explanation = false
