[profile.default]
# Unit tests — fast, parallel, no external services needed.
test-threads = "num-cpus"
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = false

[profile.integration]
# NATS + E2E integration tests.  Run with:
#
#   cargo nextest run --profile integration
#
# Requires NATS JetStream reachable at $NATS_URL (set automatically in the
# devcontainer; override with NATS_URL=nats://localhost:4222 outside it).
#
# Tests marked #[ignore] are opt-in to this profile via include-ignored.
# Lower concurrency prevents races on shared JetStream streams.
test-threads = 4
slow-timeout = { period = "60s", terminate-after = 2 }
fail-fast = false

[[profile.integration.overrides]]
# Give E2E and dispatch tests more time — they wait on message round-trips.
filter = 'test(e2e) | test(nats_dispatch) | test(round_trip)'
slow-timeout = { period = "120s", terminate-after = 2 }
test-threads = 2

[[profile.integration.overrides]]
# Real-LLM integration tests make multiple parallel LLM calls — allow up to 5 minutes.
filter = 'test(llm_integration)'
slow-timeout = { period = "300s", terminate-after = 2 }
test-threads = 1
