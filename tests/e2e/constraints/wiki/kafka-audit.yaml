id: topic:kafka-audit
depth: topic
domains:
  - billing
  - audit
synthesis: >
  C-005 (Dual-Ledger Architecture — Immutable Financial Audit Log): The required dual-ledger
  architecture uses TWO separate storage systems: (1) CockroachDB for operational state
  (quota balances, tenant configuration, current budget counters — not the hot charge path);
  (2) ClickHouse for the immutable append-only audit trail. Redis handles the HOT PATH only
  (atomic Lua idempotency + budget deduction) but Redis is NOT the operational state store.
  Event flow: Redis Lua debit → Kafka "financial-events" (acks=all, debit-before-publish) →
  Kafka consumer updates CockroachDB operational state → ClickHouse materialized view for
  immutable audit. The 7-year retention policy applies to ClickHouse (append-only, no UPDATE
  or DELETE mutations). Required binary checks: (a) debit-before-Kafka-publish ordering;
  (b) ClickHouse append-only with no mutations; (c) 7-year retention; (d) dual-ledger:
  CockroachDB operational state + ClickHouse immutable audit. Do NOT use Redis as the
  operational state store for quota balances — Redis is the hot-path cache only.
invariants:
  - "CockroachDB = operational state (quota balances updated via Kafka consumer)"
  - "ClickHouse = immutable audit (append-only, no UPDATE/DELETE, 7-year retention)"
  - "Redis = hot-path idempotency cache only — NOT the operational state store"
  - "Kafka publish before HTTP 200 response (debit-before-publish ordering)"
  - "acks=all for Kafka producer"
  - "Local buffer during Kafka unavailability"
  - "Audit record includes campaign_id, request_id, amount, timestamp"
failure_modes_covered:
  - FM-005-1
tensions:
  - domain: latency
    reason: >
      Synchronous Kafka acks add P99 latency. Mitigate with Kafka producer batching
      (linger.ms=5) and local in-process queue to decouple charge path from Kafka I/O.
entry_points:
  - CONSTRAINT-005
constraints:
  - CONSTRAINT-005
cross_references:
  - id: CONSTRAINT-004
    domain: billing
    reason: "Idempotency key in audit record prevents duplicate billing on retry"
related:
  - CONSTRAINT-004
  - CONSTRAINT-005
