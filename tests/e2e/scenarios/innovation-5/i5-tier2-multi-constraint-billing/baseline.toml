# INNOVATION-5 Tier 2 — B3 arm (no MAPE-K enforcement loop)
# Identical to h2ai.toml except max_autonomic_retries = 0:
# 3 explorers generate proposals, verifier scores them, synthesis selects winner.
# No retry wave — this is the "temperature-diverse MoA without enforcement" baseline.
# The ONLY difference from h2ai.toml is the enforcement loop.

nats_url = "nats://host.docker.internal:4222"
verifier_consensus_passes = 1
max_autonomic_retries = 0

calibration_adapter_count = 1
calibration_max_tokens    = 256

[safety]
profile = "development"

[constraint_wiki]
mode = "fs"
corpus_path = "tests/e2e/constraints"

[[adapter_profiles]]
name = "local-1"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "http://host.docker.internal:8080/v1"
api_key_env = ""
provider    = "llama_cpp"
model       = "local"

[[adapter_profiles]]
name = "local-2"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "http://host.docker.internal:8080/v1"
api_key_env = ""
provider    = "llama_cpp"
model       = "local"

[[adapter_profiles]]
name = "local-3"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "http://host.docker.internal:8080/v1"
api_key_env = ""
provider    = "llama_cpp"
model       = "local"

[[adapter_profiles]]
name = "researcher"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "http://host.docker.internal:8080/v1"
api_key_env = ""
provider    = "llama_cpp"
model       = "local"

[[adapter_profiles]]
name = "shadow_auditor"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "http://host.docker.internal:8080/v1"
api_key_env = ""
provider    = "llama_cpp"
model       = "local"

[hitl]
enabled = false

[thinking_loop]
enabled            = true
max_iterations     = 3
coverage_threshold = 0.75

debug_log_path = "/tmp/h2ai-debug-i5-tier2-baseline.ndjson"

[gap_i1]
enabled                  = true
cold_check_threshold     = 0.0
synthesis_min_confidence = 0.7
max_gap_records_per_wave = 3
researcher_timeout_secs  = 120

[complexity_routing]
enabled                        = true
complexity_probe_adapter       = "researcher"
complexity_probe_timeout_secs  = 30
decompose_threshold            = 4
hitl_threshold                 = 5
verifier_decomposition_enabled = false

[complexity_routing.intra_retry]
enabled                       = true
entropy_threshold             = 0.6
retry_slope_threshold         = 0.05
n_eff_cg_product_threshold    = 0.3
min_retry_count_for_detection = 2
