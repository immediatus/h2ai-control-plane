# INNOVATION-5 Tier 2 — H2-P arm, Gemini adapters
# Run: python3 tests/e2e/replay.py innovation-5/i5-tier2-multi-constraint-billing --config h2ai-gemini.toml

nats_url = "nats://host.docker.internal:4222"
verifier_consensus_passes = 1
max_autonomic_retries = 4
knowledge_domain_scoping = true

calibration_adapter_count = 1
calibration_max_tokens    = 256

[safety]
profile = "development"

[constraint_wiki]
mode = "fs"
corpus_path = "tests/e2e/constraints"

[[adapter_profiles]]
name = "local-1"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "https://generativelanguage.googleapis.com/v1beta/openai"
api_key_env = "GEMINI_API_KEY"
provider    = "gemini"
model       = "gemini-2.0-flash"

[[adapter_profiles]]
name = "local-2"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "https://generativelanguage.googleapis.com/v1beta/openai"
api_key_env = "GEMINI_API_KEY"
provider    = "gemini"
model       = "gemini-2.0-flash"

[[adapter_profiles]]
name = "local-3"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "https://generativelanguage.googleapis.com/v1beta/openai"
api_key_env = "GEMINI_API_KEY"
provider    = "gemini"
model       = "gemini-2.0-flash"

[[adapter_profiles]]
name = "researcher"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "https://generativelanguage.googleapis.com/v1beta/openai"
api_key_env = "GEMINI_API_KEY"
provider    = "gemini"
model       = "gemini-2.0-flash"

[[adapter_profiles]]
name = "shadow_auditor"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "https://generativelanguage.googleapis.com/v1beta/openai"
api_key_env = "GEMINI_API_KEY"
provider    = "gemini"
model       = "gemini-2.0-flash"

[hitl]
enabled = false

[thinking_loop]
enabled            = true
max_iterations     = 3
coverage_threshold = 0.75

debug_log_path = "/tmp/h2ai-debug-i5-tier2-gemini.ndjson"

[gap_i1]
enabled                  = true
cold_check_threshold     = 0.0
synthesis_min_confidence = 0.7
max_gap_records_per_wave = 3
researcher_timeout_secs  = 120

[complexity_routing]
enabled                        = true
complexity_probe_adapter       = "researcher"
complexity_probe_timeout_secs  = 30
decompose_threshold            = 4
hitl_threshold                 = 5
verifier_decomposition_enabled = false

[complexity_routing.intra_retry]
enabled                       = true
entropy_threshold             = 0.6
retry_slope_threshold         = 0.05
n_eff_cg_product_threshold    = 0.3
min_retry_count_for_detection = 2

[awareness_probe]
enabled          = true
mode             = "shadow"
judge_max_tokens = 1024
