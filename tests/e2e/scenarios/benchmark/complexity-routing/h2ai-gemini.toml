# Benchmark: Complexity-Ceiling Routing — Gemini adapters
# Uses gemini-2.5-pro for explorers, gemini-2.0-flash for researcher/verifier/support
# Run: python3 replay.py benchmark/complexity-routing --config h2ai-gemini.toml

nats_url = "nats://host.docker.internal:4222"
verifier_consensus_passes = 1
max_autonomic_retries = 4

calibration_adapter_count = 1
calibration_max_tokens    = 512

[safety]
profile = "development"

[safety.shadow_auditor]
enabled = true
strict  = false

[constraint_wiki]
mode = "fs"
corpus_path = "tests/e2e/constraints"

[[adapter_profiles]]
name = "local-1"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "https://generativelanguage.googleapis.com/v1beta/openai"
api_key_env = "GEMINI_API_KEY"
provider     = "gemini"
model       = "gemini-2.5-flash"

[[adapter_profiles]]
name = "local-2"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "https://generativelanguage.googleapis.com/v1beta/openai"
api_key_env = "GEMINI_API_KEY"
provider     = "gemini"
model       = "gemini-2.5-flash"

[[adapter_profiles]]
name = "local-3"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "https://generativelanguage.googleapis.com/v1beta/openai"
api_key_env = "GEMINI_API_KEY"
provider     = "gemini"
model       = "gemini-2.5-flash"

[[adapter_profiles]]
name = "researcher"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "https://generativelanguage.googleapis.com/v1beta/openai"
api_key_env = "GEMINI_API_KEY"
provider     = "gemini"
model       = "gemini-2.0-flash"

[[adapter_profiles]]
name = "shadow_auditor"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "https://generativelanguage.googleapis.com/v1beta/openai"
api_key_env = "GEMINI_API_KEY"
provider     = "gemini"
model       = "gemini-2.0-flash"

[hitl]
enabled = false

[thinking_loop]
enabled            = true
max_iterations     = 2
coverage_threshold = 0.70

debug_log_path = "/tmp/h2ai-debug-complexity-routing-gemini.ndjson"

[gap_i1]
enabled                  = true
cold_check_threshold     = 0.0
synthesis_min_confidence = 0.7
max_gap_records_per_wave = 3
researcher_timeout_secs  = 60

[complexity_routing]
enabled                        = true
complexity_probe_adapter       = "researcher"
complexity_probe_timeout_secs  = 30
decompose_threshold            = 3
hitl_threshold                 = 5
verifier_decomposition_enabled = true

[complexity_routing.agent_dropout]
enabled                  = true
n_eff_dropout_threshold  = 0.5

[complexity_routing.intra_retry]
enabled                       = true
entropy_threshold             = 0.6
retry_slope_threshold         = 0.05
n_eff_cg_product_threshold    = 0.3
min_retry_count_for_detection = 2
