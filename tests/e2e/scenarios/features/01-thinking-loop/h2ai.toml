# Feature isolation: thinking loop ON
# All other features minimal to isolate contribution

calibration_max_tokens = 512
calibration_adapter_count = 1
nats_url = "nats://localhost:4222"
verifier_consensus_passes = 1

[safety]
profile = "development"

[constraint_wiki]
mode = "disabled"

[[adapter_profiles]]
name = "local"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "http://host.docker.internal:8080/v1"
api_key_env = ""

[hitl]
enabled = false

[thinking_loop]
enabled            = true
max_iterations     = 3
max_archetypes     = 3
coverage_threshold = 0.60

debug_log_path = "/tmp/h2ai-debug-01-thinking-loop.ndjson"
