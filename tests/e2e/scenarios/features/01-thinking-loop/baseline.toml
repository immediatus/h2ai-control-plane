# Feature isolation: thinking loop OFF (baseline)
# Identical to h2ai.toml except thinking_loop.enabled = false

calibration_max_tokens = 512
calibration_adapter_count = 1
nats_url = "nats://localhost:4222"
verifier_consensus_passes = 1

[safety]
profile = "development"

[constraint_wiki]
mode = "disabled"

[[adapter_profiles]]
name = "local"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "http://host.docker.internal:8080/v1"
api_key_env = ""

[hitl]
enabled = false

[thinking_loop]
enabled = false

debug_log_path = "/tmp/h2ai-debug-01-thinking-loop-baseline.ndjson"
