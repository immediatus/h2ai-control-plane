# Feature isolation: bandit + TAO diversity ON
# Wide tau spread across 3 adapters → diverse conservative/creative proposals.
# All other features minimal to isolate contribution.

calibration_max_tokens = 512
calibration_adapter_count = 1
calibration_tau_spread = [0.15, 0.85]
tau_spread_max_factor = 2.5
bandit_n_max_arms = 4
bandit_n_max_initial = 3
nats_url = "nats://localhost:4222"

[safety]
profile = "development"

[[adapter_profiles]]
name = "local"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "http://host.docker.internal:8080/v1"
api_key_env = ""

[hitl]
enabled = false

[thinking_loop]
enabled = false

[srani]
enabled = false

debug_log_path = "/tmp/h2ai-debug-04-bandit-tao.ndjson"
