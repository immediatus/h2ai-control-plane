# Feature isolation: bandit + TAO diversity OFF
# Single adapter at fixed tau → homogeneous proposals, no ensemble diversity.

calibration_max_tokens = 512
calibration_adapter_count = 1
calibration_tau_spread = [0.5, 0.5]
tau_spread_max_factor = 1.0
bandit_n_max_arms = 1
bandit_n_max_initial = 1
nats_url = "nats://localhost:4222"

[safety]
profile = "development"

[[adapter_profiles]]
name = "local"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "http://host.docker.internal:8080/v1"
api_key_env = ""

[hitl]
enabled = false

[thinking_loop]
enabled = false

[srani]
enabled = false

debug_log_path = "/tmp/h2ai-debug-04-bandit-tao-baseline.ndjson"
