# Feature isolation: verifier consensus OFF (baseline, 1 pass)
# Identical to h2ai.toml except verifier_consensus_passes = 1

calibration_max_tokens = 512
calibration_adapter_count = 1
nats_url = "nats://localhost:4222"
verifier_consensus_passes = 1

[safety]
profile = "development"

[constraint_wiki]
mode = "fs"
corpus_path = "tests/e2e/constraints"

[[adapter_profiles]]
name = "local"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "http://host.docker.internal:8080/v1"
api_key_env = ""

[hitl]
enabled = false

[thinking_loop]
enabled = false

debug_log_path = "/tmp/h2ai-debug-05-verifier-consensus-baseline.ndjson"
