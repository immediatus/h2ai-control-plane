# Feature isolation: HITL gate ON
# Low confidence threshold to ensure gate fires

calibration_max_tokens = 512
calibration_adapter_count = 1
nats_url = "nats://localhost:4222"
verifier_consensus_passes = 1
verify_threshold = 0.0

[safety]
profile = "development"

[constraint_wiki]
mode = "disabled"

[[adapter_profiles]]
name = "local"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "http://host.docker.internal:8080/v1"
api_key_env = ""

[hitl]
enabled              = true
confidence_threshold = 0.50
timeout_ms           = 600000

[thinking_loop]
enabled = false

debug_log_path = "/tmp/h2ai-debug-03-hitl.ndjson"
