# Feature isolation: leader election ON, 2 explorers, multi-wave retries enabled
# verify_threshold=0.3 ensures some waves fail so the leader election fires.

calibration_max_tokens = 512
calibration_adapter_count = 1
nats_url = "nats://localhost:4222"
verifier_consensus_passes = 1
verify_threshold = 0.3
max_autonomic_retries = 3
leader_enabled = true
leader_stagnation_threshold = 0.02
leader_stagnation_waves = 2
leader_eig_candidates = 2
leader_diagnosis_max_tokens = 128
leader_diagnosis_tau = 0.3

[safety]
profile = "development"

[constraint_wiki]
mode = "disabled"

[[adapter_profiles]]
name = "local"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "http://host.docker.internal:8080/v1"
api_key_env = ""

[hitl]
enabled = false

[thinking_loop]
enabled = false

debug_log_path = "/tmp/h2ai-debug-07-leader-election.ndjson"
