# Full-stack baseline: all features OFF, single-pass verifier, single adapter.
# Represents a plain LLM orchestration pipeline with no H2AI intelligence layers.
# Used with --compare to measure cumulative feature uplift.

calibration_max_tokens = 512
calibration_adapter_count = 1
nats_url = "nats://localhost:4222"
verifier_consensus_passes = 1
verify_threshold = 0.3

[safety]
profile = "development"

[constraint_wiki]
enabled = false

[[adapter_profiles]]
name = "local"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "http://host.docker.internal:8080/v1"
api_key_env = ""

[srani]
enabled = false

[hitl]
enabled = false

[thinking_loop]
enabled = false

debug_log_path = "/tmp/h2ai-debug-09-full-stack-baseline.ndjson"
