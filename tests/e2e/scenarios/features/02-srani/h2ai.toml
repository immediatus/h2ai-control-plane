# Feature isolation: SRANI ON
# All other features minimal to isolate contribution

calibration_max_tokens = 512
calibration_adapter_count = 1
nats_url = "nats://localhost:4222"
verifier_consensus_passes = 1

[safety]
profile = "development"

[constraint_wiki]
enabled     = true
corpus_path = "tests/e2e/constraints"

[[adapter_profiles]]
name = "local"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "http://host.docker.internal:8080/v1"
api_key_env = ""

[srani]
enabled        = true
adaptive       = true
gate_threshold = 0.50

[hitl]
enabled = false

[thinking_loop]
enabled = false

debug_log_path = "/tmp/h2ai-debug-02-srani.ndjson"
