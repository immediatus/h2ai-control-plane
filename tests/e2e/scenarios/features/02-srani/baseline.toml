# Compare baseline: SRANI OFF
# Same task, same verifier threshold — isolates SRANI contribution.

calibration_max_tokens = 512
calibration_adapter_count = 1
nats_url = "nats://localhost:4222"
verifier_consensus_passes = 1
verify_threshold = 0.0
max_autonomic_retries = 2

[safety]
profile = "development"

[constraint_wiki]
mode = "disabled"

[[adapter_profiles]]
name = "local"
[adapter_profiles.kind.CloudGeneric]
endpoint    = "http://host.docker.internal:8080/v1"
api_key_env = ""

[srani]
enabled = false

[hitl]
enabled = false

[thinking_loop]
enabled = false

debug_log_path = "/tmp/h2ai-debug-02-srani-baseline.ndjson"
